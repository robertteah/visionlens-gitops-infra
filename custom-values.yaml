# custom-values.yaml

global:
  environment: "local"

# 👇 FIX: All individual microservices must live inside this components block
components:

  loadgenerator:
    enabled: true
    image: "ghcr.io/open-telemetry/opentelemetry-demo/loadgenerator:1.10.0"
    resources:
      requests:
        cpu: 550m
        memory: 2Gi
      limits:
        cpu: 1200m
        memory: 4Gi # 👈 Your OOMKilled fix memory bump

  frontend:
    resources:
      limits:
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

  checkoutservice:
    resources:
      limits:
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

